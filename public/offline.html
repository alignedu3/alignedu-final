<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlignEDU Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1d4ed8 0%, #0f172a 38%, #020617 100%);
        color: #e2e8f0;
      }

      .card {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 24px;
        border: 1px solid rgba(125, 211, 252, 0.16);
        background: rgba(15, 23, 42, 0.86);
        box-shadow: 0 28px 80px rgba(2, 6, 23, 0.45);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.14);
        color: #7dd3fc;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 14px;
        color: #cbd5e1;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 12px;
        padding: 12px 16px;
        border-radius: 14px;
        background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">AlignEDU</div>
      <h1>You’re offline right now.</h1>
      <p>
        AlignEDU needs an internet connection for lesson analysis and account access, but the app shell is still installed on this device.
      </p>
      <p>
        Reconnect to keep recording, upload audio, and review live analysis results.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
